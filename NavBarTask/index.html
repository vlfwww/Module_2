<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nav Bar</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <input type="checkbox" id="menu-toggle" class="menu-toggle-input" />

      <a href="#">
        <figure class="company-logo">
          <img src="./assets/images/logo.jfif" alt="Company logo" />
          <figcaption>My Company</figcaption>
        </figure>
      </a>

      <nav class="navigation-links">
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
      </nav>

      <div class="burger-menu">
        <label for="menu-toggle" class="burger-image-label">
          <img alt="burger menu icon" src="./assets/images/menu.svg" />
        </label>
      </div>

      <figure class="avatar-icon">
        <img alt="avatar-icon" src="./assets/images/avatar.svg" />
      </figure>
    </header>
  </body>
</html>
